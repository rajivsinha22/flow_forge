server:
  port: 8080

spring:
  application:
    name: flowforge-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
              - PATCH
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: flowforge-secret-key-change-in-production-must-be-256-bits-long

# Direct service URLs — no Eureka/service-discovery needed for local dev
services:
  client:      http://localhost:8081
  workflow:    http://localhost:8082
  execution:   http://localhost:8083
  integration: http://localhost:8084
  websocket:   http://localhost:8085
  billing:     http://localhost:8086

logging:
  level:
    org.springframework.cloud.gateway: INFO
    com.flowforge: DEBUG
