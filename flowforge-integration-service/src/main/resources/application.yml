server:
  port: 8084

spring:
  application:
    name: flowforge-integration-service

  data:
    mongodb:
      uri: mongodb://localhost:27017/flowforge_integrations
    redis:
      host: localhost
      port: 6379

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: flowforge-integration
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  quartz:
    job-store-type: jdbc
    jdbc:
      initialize-schema: always
    properties:
      org:
        quartz:
          scheduler:
            instanceName: FlowForgeIntegrationScheduler
            instanceId: AUTO
          jobStore:
            class: org.quartz.impl.jdbcjobstore.JobStoreTX
            driverDelegateClass: org.quartz.impl.jdbcjobstore.StdJDBCDelegate
            tablePrefix: QRTZ_
            isClustered: false
          threadPool:
            class: org.quartz.simpl.SimpleThreadPool
            threadCount: 5
            threadPriority: 5

# FlowForge service URLs
flowforge:
  execution-engine:
    url: http://localhost:8081
  client-service:
    url: http://localhost:8082

logging:
  level:
    com.flowforge.integration: DEBUG
    org.springframework.kafka: INFO
    org.quartz: INFO
