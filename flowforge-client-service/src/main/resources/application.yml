server:
  port: 8081

spring:
  application:
    name: flowforge-client-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/flowforge_clients
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: flowforge-secret-key-change-in-production-must-be-256-bits-long
    expiration: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.flowforge: DEBUG
    org.springframework.security: INFO
    org.springframework.data.mongodb: INFO
