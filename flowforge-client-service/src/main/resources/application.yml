server:
  port: 8081

spring:
  application:
    name: flowforge-client-service
  data:
    mongodb:
      uri: mongodb://localhost:27017/flowforge_clients
    redis:
      host: localhost
      port: 6379
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: ${SMTP_AUTH:false}
      mail.smtp.starttls.enable: ${SMTP_STARTTLS:false}

app:
  jwt:
    secret: flowforge-secret-key-change-in-production-must-be-256-bits-long
    expiration: 86400000
  base-url: ${APP_BASE_URL:http://localhost:3000}
  invitation-expiry-hours: ${INVITATION_EXPIRY_HOURS:72}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.flowforge: DEBUG
    org.springframework.security: INFO
    org.springframework.data.mongodb: INFO
